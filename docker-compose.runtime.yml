services:
  events-web:
    image: node:22.22.3-bookworm-slim@sha256:e21fc383b50d5347dc7a9f1cae45b8f4e2f0d39f7ade28e4eef7d2934522b752
    container_name: ig-event-web
    working_dir: /app
    command: ["npm", "run", "start", "--", "--hostname", "0.0.0.0", "--port", "3000"]
    env_file:
      - .env.local
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      APIFY_DATA_DETAIL_LEVEL: ${APIFY_DATA_DETAIL_LEVEL:-basicData}
      APIFY_MAX_TOTAL_CHARGE_USD_PER_RUN: ${APIFY_MAX_TOTAL_CHARGE_USD_PER_RUN:-0.02}
      APIFY_RUN_TIMEOUT_SECONDS: ${APIFY_RUN_TIMEOUT_SECONDS:-180}
      APIFY_MEMORY_MBYTES: ${APIFY_MEMORY_MBYTES:-4096}
      APIFY_SKIP_PINNED_POSTS: ${APIFY_SKIP_PINNED_POSTS:-false}
      INGESTION_FULL_SCRAPE_CONCURRENCY: ${INGESTION_FULL_SCRAPE_CONCURRENCY:-8}
      INGESTION_REPROCESS_EXISTING_SOURCE_POSTS: ${INGESTION_REPROCESS_EXISTING_SOURCE_POSTS:-false}
      CRON_INGESTION_MAX_STEPS: ${CRON_INGESTION_MAX_STEPS:-20}
      CRON_INGESTION_BATCH_SIZE: ${CRON_INGESTION_BATCH_SIZE:-64}
    volumes:
      - .:/app:ro
      - next-cache:/app/.next/cache
    labels:
      - traefik.enable=true
      - traefik.docker.network=n8n-compose_default
      - traefik.http.routers.ig-event.entrypoints=websecure
      - traefik.http.routers.ig-event.rule=Host(`events.ineedtofeedmyrabbit.com`)
      - traefik.http.routers.ig-event.tls=true
      - traefik.http.routers.ig-event.tls.certresolver=mytlschallenge
      - traefik.http.services.ig-event.loadbalancer.server.port=3000
    networks:
      - traefik
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/api/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 2h
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  next-cache:

networks:
  traefik:
    external: true
    name: n8n-compose_default
