services:
  web:
    build:
      context: .
      args:
        NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
        NEXT_PUBLIC_CLERK_INSTAGRAM_OAUTH_STRATEGY: ${NEXT_PUBLIC_CLERK_INSTAGRAM_OAUTH_STRATEGY:-}
        NEXT_PUBLIC_CONVEX_URL: ${NEXT_PUBLIC_CONVEX_URL}
    image: ig-event-web:20260623-d1273bd95471
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
      CLERK_JWT_ISSUER_DOMAIN: ${CLERK_JWT_ISSUER_DOMAIN}
      CLERK_AUTHORIZED_PARTIES: ${CLERK_AUTHORIZED_PARTIES:-https://events.ineedtofeedmyrabbit.com}
      NEXT_PUBLIC_CLERK_SIGN_IN_URL: ${NEXT_PUBLIC_CLERK_SIGN_IN_URL:-/sign-in}
      NEXT_PUBLIC_CLERK_SIGN_UP_URL: ${NEXT_PUBLIC_CLERK_SIGN_UP_URL:-/sign-up}
      NEXT_PUBLIC_CLERK_SIGN_IN_FALLBACK_REDIRECT_URL: ${NEXT_PUBLIC_CLERK_SIGN_IN_FALLBACK_REDIRECT_URL:-/admin}
      NEXT_PUBLIC_CLERK_SIGN_UP_FALLBACK_REDIRECT_URL: ${NEXT_PUBLIC_CLERK_SIGN_UP_FALLBACK_REDIRECT_URL:-/admin}
      NEXT_PUBLIC_CLERK_INSTAGRAM_OAUTH_STRATEGY: ${NEXT_PUBLIC_CLERK_INSTAGRAM_OAUTH_STRATEGY:-}
      NEXT_PUBLIC_CONVEX_URL: ${NEXT_PUBLIC_CONVEX_URL}
      CONVEX_DEPLOYMENT: ${CONVEX_DEPLOYMENT}
      ADMIN_CLERK_USER_IDS: ${ADMIN_CLERK_USER_IDS}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      APIFY_API_TOKEN: ${APIFY_API_TOKEN}
      APIFY_INSTAGRAM_ACTOR_ID: ${APIFY_INSTAGRAM_ACTOR_ID:-apify/instagram-post-scraper}
      APIFY_DATA_DETAIL_LEVEL: ${APIFY_DATA_DETAIL_LEVEL:-basicData}
      APIFY_MAX_TOTAL_CHARGE_USD_PER_RUN: ${APIFY_MAX_TOTAL_CHARGE_USD_PER_RUN:-0.01}
      APIFY_RUN_TIMEOUT_SECONDS: ${APIFY_RUN_TIMEOUT_SECONDS:-180}
      APIFY_MEMORY_MBYTES: ${APIFY_MEMORY_MBYTES:-4096}
      APIFY_SKIP_PINNED_POSTS: ${APIFY_SKIP_PINNED_POSTS:-false}
      INGESTION_FULL_SCRAPE_CONCURRENCY: ${INGESTION_FULL_SCRAPE_CONCURRENCY:-8}
      INGESTION_POST_STEP_LIMIT: ${INGESTION_POST_STEP_LIMIT:-8}
      SCRAPED_POST_PAGE_SIZE: ${SCRAPED_POST_PAGE_SIZE:-25}
      INGESTION_REPROCESS_EXISTING_SOURCE_POSTS: ${INGESTION_REPROCESS_EXISTING_SOURCE_POSTS:-false}
      OPENAI_VISION_MODEL: ${OPENAI_VISION_MODEL:-gpt-4.1-mini}
      OPENAI_REVIEW_MODEL: ${OPENAI_REVIEW_MODEL:-gpt-4.1-mini}
      CRON_SECRET: ${CRON_SECRET}
      CRON_RESULTS_LIMIT: ${CRON_RESULTS_LIMIT:-1}
      CRON_DAYS_BACK: ${CRON_DAYS_BACK:-10}
      CRON_INGESTION_MAX_STEPS: ${CRON_INGESTION_MAX_STEPS:-20}
      CRON_INGESTION_BATCH_SIZE: ${CRON_INGESTION_BATCH_SIZE:-64}
      CRON_MAX_HANDLES_PER_RUN: ${CRON_MAX_HANDLES_PER_RUN:-2000}
      CRON_FULL_SCRAPE_COOLDOWN_HOURS: ${CRON_FULL_SCRAPE_COOLDOWN_HOURS:-23}
      FOLLOW_DISCOVERY_SOURCE_HANDLE: ${FOLLOW_DISCOVERY_SOURCE_HANDLE:-eventzeka}
      FOLLOW_DISCOVERY_ACTOR_ID: ${FOLLOW_DISCOVERY_ACTOR_ID:-scraping_solutions/instagram-scraper-followers-following-no-cookies}
      FOLLOW_DISCOVERY_RESULTS_LIMIT: ${FOLLOW_DISCOVERY_RESULTS_LIMIT:-2000}
      FOLLOW_DISCOVERY_MAX_TOTAL_CHARGE_USD: ${FOLLOW_DISCOVERY_MAX_TOTAL_CHARGE_USD:-1.5}
      FOLLOW_DISCOVERY_TIMEOUT_SECONDS: ${FOLLOW_DISCOVERY_TIMEOUT_SECONDS:-300}
      FOLLOW_DISCOVERY_INGESTION_RESULTS_LIMIT: ${FOLLOW_DISCOVERY_INGESTION_RESULTS_LIMIT:-1}
      FOLLOW_DISCOVERY_INGESTION_DAYS_BACK: ${FOLLOW_DISCOVERY_INGESTION_DAYS_BACK:-10}
      EVENTS_TIMEZONE: ${EVENTS_TIMEZONE:-Europe/Belgrade}
    labels:
      - traefik.enable=true
      - traefik.docker.network=n8n-compose_default
      - traefik.http.routers.ig-event.entrypoints=websecure
      - traefik.http.routers.ig-event.rule=Host(`events.ineedtofeedmyrabbit.com`)
      - traefik.http.routers.ig-event.tls=true
      - traefik.http.routers.ig-event.tls.certresolver=mytlschallenge
      - traefik.http.routers.ig-event.middlewares=ig-event-hsts@docker
      - traefik.http.middlewares.ig-event-hsts.headers.stsSeconds=31536000
      - traefik.http.middlewares.ig-event-hsts.headers.stsIncludeSubdomains=true
      - traefik.http.middlewares.ig-event-hsts.headers.stsPreload=false
      - traefik.http.services.ig-event.loadbalancer.server.port=3000
    ports:
      - "${APP_BIND:-127.0.0.1}:${APP_PORT:-3007}:3000"
    networks:
      - default
      - traefik
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000/api/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 2h
      timeout: 5s
      retries: 3
      start_period: 30s

networks:
  traefik:
    external: true
    name: n8n-compose_default
